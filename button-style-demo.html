<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮样式对比示例</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 复制项目中的按钮样式定义 */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            background-color: #0d9488;
            border-radius: 0.75rem;
            color: white;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            background-color: #14b8a6;
            box-shadow: 0 4px 16px rgba(13, 148, 136, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            background-color: #0f766e;
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(13, 148, 136, 0.3);
        }

        .btn-ghost {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            background-color: rgba(20, 184, 166, 0.1);
            border: 1px solid rgba(20, 184, 166, 0.3);
            border-radius: 0.75rem;
            color: #5eead4;
            transition: all 0.2s ease;
        }

        .btn-ghost:hover {
            background-color: rgba(20, 184, 166, 0.2);
            color: #99f6e4;
            border-color: rgba(20, 184, 166, 0.5);
            box-shadow: 0 0 16px rgba(20, 184, 166, 0.15);
            transform: translateY(-1px);
        }

        .btn-ghost:active {
            background-color: rgba(20, 184, 166, 0.15);
            transform: translateY(0);
        }

        /* 项目中的深色背景 */
        body {
            background-color: #121212;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* SVG 图标样式 */
        .icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-bold mb-4">按钮样式对比</h1>
            <p class="text-gray-400 mb-8">修复前后的按钮样式对比</p>
        </div>

        <div class="bg-gray-800/60 rounded-2xl p-6 border border-gray-700/50">
            <h2 class="text-xl font-semibold mb-6 text-center">修复后的效果</h2>
            
            <div class="space-y-4">
                <div class="text-center">
                    <p class="text-sm text-gray-400 mb-2">主按钮 - btn-primary</p>
                    <button class="btn-primary">
                        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>创建第一个对话</span>
                    </button>
                </div>

                <div class="text-center">
                    <p class="text-sm text-gray-400 mb-2">次按钮 - btn-ghost</p>
                    <button class="btn-ghost">
                        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
                        </svg>
                        <span>模板库</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-gray-800/60 rounded-2xl p-6 border border-gray-700/50">
            <h2 class="text-xl font-semibold mb-6 text-center">修复前的问题</h2>
            
            <div class="space-y-4">
                <div class="text-center">
                    <p class="text-sm text-gray-400 mb-2">主按钮 - btn-primary</p>
                    <button class="btn-primary">
                        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>创建第一个对话</span>
                    </button>
                </div>

                <div class="text-center">
                    <p class="text-sm text-gray-400 mb-2">次按钮 - btn-secondary (未定义样式)</p>
                    <button class="btn-secondary" style="
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 0.5rem;
                        padding: 1rem 1.5rem;
                        background-color: transparent;
                        border: 1px solid transparent;
                        border-radius: 0.75rem;
                        color: #a1a1aa;
                        cursor: pointer;
                    ">
                        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
                        </svg>
                        <span>模板库</span>
                    </button>
                    <p class="text-xs text-red-400 mt-2">样式缺失，看起来像普通文本</p>
                </div>
            </div>
        </div>

        <div class="text-center text-sm text-gray-500">
            <p>修复方案：将 <code class="bg-gray-700 px-2 py-1 rounded">btn-secondary</code> 改为 <code class="bg-gray-700 px-2 py-1 rounded">btn-ghost</code></p>
        </div>
    </div>
</body>
</html>
