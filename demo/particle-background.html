<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子星云背景 - 效果演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow-x: hidden;
      background-color: #020617;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      display: block;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      pointer-events: none;
    }

    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #94a3b8;
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .info-panel {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(51, 65, 85, 0.6);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-top: 2rem;
      max-width: 500px;
      pointer-events: auto;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.4);
      font-size: 0.9rem;
    }

    .info-row:last-child { border-bottom: none; }
    .info-label { color: #94a3b8; }
    .info-value { color: #38bdf8; font-weight: 500; font-family: monospace; }

    .controls {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 100;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 300px;
    }

    .control-btn {
      padding: 0.6rem 1.2rem;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(51, 65, 85, 0.6);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .control-btn:hover {
      background: rgba(30, 41, 59, 0.95);
      border-color: #0ea5e9;
      color: #38bdf8;
    }

    .control-btn.active {
      background: rgba(14, 165, 233, 0.25);
      border-color: #0ea5e9;
      color: #38bdf8;
    }

    @media (max-width: 768px) {
      .controls {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
        justify-content: center;
        max-width: none;
      }
      .info-panel { margin-left: 1rem; margin-right: 1rem; padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="content">
    <h1 class="title">DeepMindMap</h1>
    <p class="subtitle">
      流动粒子星云背景效果演示<br>
      移动鼠标与粒子互动
    </p>

    <div class="info-panel">
      <div class="info-row">
        <span class="info-label">粒子数量</span>
        <span class="info-value" id="particle-count">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">帧率 (FPS)</span>
        <span class="info-value" id="fps-display">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">鼠标位置</span>
        <span class="info-value" id="mouse-pos">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">活跃连线数</span>
        <span class="info-value" id="connection-count">--</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="control-btn active" id="btn-lines">显示连线</button>
    <button class="control-btn active" id="btn-glow">粒子发光</button>
    <button class="control-btn" id="btn-pause">暂停动画</button>
  </div>

  <script>
    (function() {
      var canvas = document.getElementById('particle-canvas');
      if (!canvas) {
        console.error('Canvas 元素未找到');
        return;
      }

      var ctx = canvas.getContext('2d');
      if (!ctx) {
        console.error('无法获取 Canvas 2D 上下文');
        return;
      }

      function isMobileDevice() {
        return window.innerWidth <= 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      }

      var mobile = isMobileDevice();
      var W = window.innerWidth;
      var H = window.innerHeight;

      canvas.width = W;
      canvas.height = H;
      canvas.style.width = '100vw';
      canvas.style.height = '100vh';

      var CONFIG = mobile ? {
        count: 40,
        connectDist: 110,
        mouseRadius: 130,
        mouseForce: 0.04,
        speed: 0.18,
        colors: ['#0ea5e9', '#8b5cf6', '#3b82f6'],
        minSize: 1.5,
        maxSize: 3,
        lineWidth: 0.5
      } : {
        count: 80,
        connectDist: 140,
        mouseRadius: 200,
        mouseForce: 0.03,
        speed: 0.28,
        colors: ['#0ea5e9', '#8b5cf6', '#3b82f6', '#06b6d4'],
        minSize: 1.8,
        maxSize: 3.5,
        lineWidth: 0.5
      };

      var particles = [];
      var mouse = { x: null, y: null };
      var running = true;
      var showLines = true;
      var showGlow = true;

      var lastTime = Date.now();
      var frames = 0;
      var fpsVal = 60;

      function hexToRgba(hex, a) {
        var r = parseInt(hex.slice(1, 3), 16);
        var g = parseInt(hex.slice(3, 5), 16);
        var b = parseInt(hex.slice(5, 7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
      }

      function Particle() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * CONFIG.speed * 2;
        this.vy = (Math.random() - 0.5) * CONFIG.speed * 2;
        this.r = CONFIG.minSize + Math.random() * (CONFIG.maxSize - CONFIG.minSize);
        this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
        this.baseAlpha = 0.4 + Math.random() * 0.6;
        this.alpha = this.baseAlpha;
        this.phase = Math.random() * Math.PI * 2;
        this.pulseRate = 0.003 + Math.random() * 0.007;
      }

      Particle.prototype.update = function(t) {
        if (!running) return;

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) { this.x = 0; this.vx *= -1; }
        if (this.x > W) { this.x = W; this.vx *= -1; }
        if (this.y < 0) { this.y = 0; this.vy *= -1; }
        if (this.y > H) { this.y = H; this.vy *= -1; }

        if (mouse.x !== null && mouse.y !== null) {
          var dx = mouse.x - this.x;
          var dy = mouse.y - this.y;
          var d = Math.sqrt(dx * dx + dy * dy);

          if (d < CONFIG.mouseRadius) {
            var f = (CONFIG.mouseRadius - d) / CONFIG.mouseRadius * CONFIG.mouseForce;
            this.vx += dx * f;
            this.vy += dy * f;
            this.alpha = Math.min(1, this.baseAlpha + (1 - d / CONFIG.mouseRadius) * 0.6);
          } else {
            this.alpha += (this.baseAlpha - this.alpha) * 0.04;
          }
        } else {
          this.alpha += (this.baseAlpha - this.alpha) * 0.04;
        }

        var pulse = Math.sin(t * this.pulseRate + this.phase);
        this.drawAlpha = this.alpha * (0.7 + pulse * 0.3);
      };

      Particle.prototype.draw = function() {
        if (showGlow) {
          var grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 5);
          grad.addColorStop(0, hexToRgba(this.color, 0.35));
          grad.addColorStop(0.4, hexToRgba(this.color, 0.12));
          grad.addColorStop(1, hexToRgba(this.color, 0));
          ctx.beginPath();
          ctx.fillStyle = grad;
          ctx.arc(this.x, this.y, this.r * 4.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.beginPath();
        ctx.fillStyle = hexToRgba('#ffffff', this.drawAlpha || this.alpha);
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
      };

      function initParticles() {
        particles = [];
        for (var i = 0; i < CONFIG.count; i++) {
          particles.push(new Particle());
        }
        document.getElementById('particle-count').textContent = particles.length;
      }

      function drawLines() {
        if (!showLines || !running) return 0;
        var cnt = 0;
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var d = Math.sqrt(dx * dx + dy * dy);

            if (d < CONFIG.connectDist) {
              cnt++;
              var a = (1 - d / CONFIG.connectDist) * 0.32;
              var a1 = a * (particles[i].drawAlpha || particles[i].alpha);
              var a2 = a * (particles[j].drawAlpha || particles[j].alpha);

              var lg = ctx.createLinearGradient(
                particles[i].x, particles[i].y,
                particles[j].x, particles[j].y
              );
              lg.addColorStop(0, hexToRgba(particles[i].color, a1));
              lg.addColorStop(1, hexToRgba(particles[j].color, a2));

              ctx.beginPath();
              ctx.strokeStyle = lg;
              ctx.lineWidth = CONFIG.lineWidth;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        return cnt;
      }

      function loop(now) {
        ctx.clearRect(0, 0, W, H);

        frames++;
        if (now - lastTime >= 1000) {
          fpsVal = Math.round(frames * 1000 / (now - lastTime));
          frames = 0;
          lastTime = now;
          document.getElementById('fps-display').textContent = fpsVal;
        }

        var connCount = drawLines();

        for (var i = 0; i < particles.length; i++) {
          particles[i].update(now);
          particles[i].draw();
        }

        document.getElementById('connection-count').textContent = connCount;
        requestAnimationFrame(loop);
      }

      initParticles();
      requestAnimationFrame(loop);

      window.addEventListener('resize', function() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
      });

      canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
        document.getElementById('mouse-pos').textContent =
          Math.round(mouse.x) + ', ' + Math.round(mouse.y);
      });

      canvas.addEventListener('mouseleave', function() {
        mouse.x = null;
        mouse.y = null;
        document.getElementById('mouse-pos').textContent = '--';
      });

      canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        var t = e.touches[0];
        var rect = canvas.getBoundingClientRect();
        mouse.x = t.clientX - rect.left;
        mouse.y = t.clientY - rect.top;
        document.getElementById('mouse-pos').textContent =
          Math.round(mouse.x) + ', ' + Math.round(mouse.y);
      }, { passive: false });

      canvas.addEventListener('touchend', function() {
        mouse.x = null;
        mouse.y = null;
        document.getElementById('mouse-pos').textContent = '--';
      });

      document.getElementById('btn-lines').addEventListener('click', function() {
        showLines = !showLines;
        this.classList.toggle('active');
      });

      document.getElementById('btn-glow').addEventListener('click', function() {
        showGlow = !showGlow;
        this.classList.toggle('active');
      });

      document.getElementById('btn-pause').addEventListener('click', function() {
        running = !running;
        this.classList.toggle('active');
        this.textContent = running ? '暂停动画' : '继续动画';
      });

      console.log('粒子背景初始化完成，粒子数量:', CONFIG.count);
    })();
  </script>
</body>
</html>
